name: Deploy to Production

on:
  push:
    branches:
      - main  # Only trigger deployment on push to main branch

jobs:
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'
      
      - name: Frontend deployment complete
        run: echo "✅ Frontend deployed to Vercel!"

  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Trigger Render Deploy
        run: |
          echo "Triggering Render deployment for backend..."
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          echo "✅ Backend deployment triggered on Render!"
      
      - name: Backend deployment complete
        run: echo "✅ Backend deploy hook sent to Render!"

